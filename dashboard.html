<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Zenova Dashboard</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>

    body{
      background:#050505;
      color:white;
      font-family:Arial,sans-serif;
    }

    .glass{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
    }

    .gold{
      color:#facc15;
    }

  </style>

</head>

<body>

<div class="min-h-screen p-6 lg:p-10">

  <!-- Header -->
  <div class="flex flex-col lg:flex-row justify-between items-center gap-5 mb-10">

    <div>

      <h1 class="text-4xl font-bold gold">
        ZENOVA EDUCATIONS
      </h1>

      <p class="text-gray-400 mt-2">
        Student Dashboard
      </p>

    </div>

    <button
      id="logoutBtn"
      class="bg-red-500 hover:bg-red-600 px-6 py-3 rounded-xl font-bold"
    >
      Logout
    </button>

  </div>


  <!-- Student Info -->
  <div class="glass rounded-3xl p-8 mb-8">

    <h2 class="text-2xl font-bold gold mb-6">
      Student Information
    </h2>

    <div class="grid md:grid-cols-2 gap-6">

      <div>
        <p class="text-gray-400">Student Name</p>
        <h3 id="studentName" class="text-2xl font-bold mt-2"></h3>
      </div>

      <div>
        <p class="text-gray-400">Email</p>
        <h3 id="studentEmail" class="text-2xl font-bold mt-2"></h3>
      </div>

      <div>
        <p class="text-gray-400">Phone Number</p>
        <h3 id="studentPhone" class="text-2xl font-bold mt-2"></h3>
      </div>

      <div>
        <p class="text-gray-400">Course</p>
        <h3 id="studentCourse" class="text-2xl font-bold mt-2"></h3>
      </div>

    </div>

  </div>


  <!-- Status -->
  <div class="grid lg:grid-cols-3 gap-6">

    <!-- Application Status -->
    <div class="glass rounded-3xl p-8">

      <p class="text-gray-400 mb-4">
        Application Status
      </p>

      <h2
        id="applicationStatus"
        class="text-4xl font-bold text-yellow-400"
      >
        Waiting for Approval
      </h2>

    </div>


    <!-- Scholarship -->
    <div class="glass rounded-3xl p-8">

      <p class="text-gray-400 mb-4">
        Scholarship Approved
      </p>

      <h2
        id="scholarshipAmount"
        class="text-4xl font-bold text-green-400"
      >
        ₹0
      </h2>

    </div>


    <!-- Final Fees -->
    <div class="glass rounded-3xl p-8">

      <p class="text-gray-400 mb-4">
        Final Payable Fees
      </p>

      <h2
        id="finalFees"
        class="text-4xl font-bold text-blue-400"
      >
        ₹0
      </h2>

    </div>

  </div>


  <!-- Remarks -->
  <div class="glass rounded-3xl p-8 mt-8">

    <p class="text-gray-400 mb-4">
      Admin Remarks
    </p>

    <h2
      id="remarks"
      class="text-2xl font-bold"
    >
      Waiting for review...
    </h2>

  </div>


  <!-- Payment -->
  <div class="glass rounded-3xl p-8 mt-8">

    <p class="text-gray-400 mb-4">
      Payment Status
    </p>

    <h2
      id="paymentStatus"
      class="text-3xl font-bold text-yellow-400"
    >
      Pending
    </h2>

  </div>

</div>


<script>

  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyAcqxS2SIpMyaY-jYOz0Y-t67Taa04Fy1o",
    authDomain: "zenova-educations.firebaseapp.com",
    projectId: "zenova-educations",
    storageBucket: "zenova-educations.firebasestorage.app",
    messagingSenderId: "66782392979",
    appId: "1:66782392979:web:2e0c7e70b688401b4f5366",
    measurementId: "G-7JL1SFKDHE"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();


  // Check Login
  auth.onAuthStateChanged(async (user)=>{

    // Not logged in
    if(!user){

      window.location.href = "index.html";
      return;

    }

    try{

      // Get Student Data
      const doc = await db
      .collection('applications')
      .doc(user.uid)
      .get();

      // No application
      if(!doc.exists){

        window.location.href = "index.html";
        return;

      }

      const data = doc.data();

      // Fill Dashboard
      document.getElementById('studentName')
      .innerText = data.studentName;

      document.getElementById('studentEmail')
      .innerText = data.email;

      document.getElementById('studentPhone')
      .innerText = data.phone;

      document.getElementById('studentCourse')
      .innerText = data.course;

      document.getElementById('applicationStatus')
      .innerText = data.status;

      document.getElementById('scholarshipAmount')
      .innerText = "₹" + data.scholarshipAmount;

      document.getElementById('finalFees')
      .innerText = "₹" + data.finalFees;

      document.getElementById('remarks')
      .innerText =
      data.remarks || "Waiting for review...";

      document.getElementById('paymentStatus')
      .innerText = data.paymentStatus;

    }
    catch(error){

      console.error(error);

      alert("Error loading dashboard");

    }

  });



  // Logout
  document.getElementById('logoutBtn')
  .addEventListener('click', async ()=>{

    await auth.signOut();

    window.location.href = "index.html";

  });

</script>

</body>
</html>
