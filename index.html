<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zenova Educations</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{

    background:#000;
    color:#fff;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    overflow:hidden;

}

.container{

    width:100%;
    max-width:420px;

    padding:30px;

}

.logo{

    width:90px;
    height:90px;

    margin:auto;

    border-radius:24px;

    background:#111;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:52px;
    font-weight:700;

    color:#fff;

    letter-spacing:-3px;

}

.brand{

    text-align:center;

    margin-top:28px;

}

.brand h1{

    font-size:28px;
    font-weight:700;

}

.brand p{

    margin-top:10px;

    color:#8c8c8c;

    font-size:15px;

    line-height:24px;

}

.card{

    margin-top:60px;

    background:#111;

    border:1px solid #1e1e1e;

    border-radius:30px;

    padding:30px;

}

.card h2{

    font-size:24px;
    font-weight:600;

}

.card span{

    display:block;

    color:#8f8f8f;

    margin-top:10px;

    font-size:15px;

    line-height:24px;

}

.google-btn{

    width:100%;

    height:58px;

    margin-top:35px;

    border:none;

    outline:none;

    border-radius:18px;

    background:#fff;

    color:#000;

    font-size:16px;

    font-weight:600;

    cursor:pointer;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;

    transition:.3s;

}

.google-btn:hover{

    transform:translateY(-2px);

}

.google-icon{

    width:22px;
    height:22px;

}

.footer{

    margin-top:30px;

    text-align:center;

    color:#666;

    font-size:13px;

    line-height:22px;

}

.version{

    margin-top:8px;

    color:#444;

    font-size:12px;

}

@media(max-width:450px){

.container{

padding:22px;

}

.card{

padding:24px;

}

}

    </style>

</head>
<body>

<div class="container">

    <div class="logo">
        Z
    </div>

    <div class="brand">

        <h1>Zenova Educations</h1>

        <p>
            Empowering Future Innovators
        </p>

    </div>

    <div class="card">

        <h2>Welcome Back 👋</h2>

        <span>
            Sign in with your Google account to continue your learning journey.
        </span>

        <button class="google-btn" id="googleLoginBtn">

            <svg class="google-icon" viewBox="0 0 48 48">
                <path fill="#FFC107" d="M43.6 20.5H42V20H24v8h11.3C33.6 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.3-.4-3.5z"/>
                <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.2 19 12 24 12c3 0 5.8 1.1 7.9 3l5.7-5.7C34.1 6.1 29.3 4 24 4c-7.7 0-14.4 4.3-17.7 10.7z"/>
                <path fill="#4CAF50" d="M24 44c5.2 0 10-2 13.5-5.3l-6.2-5.2C29.3 35 26.8 36 24 36c-5.2 0-9.6-3.3-11.2-8l-6.6 5.1C9.5 39.6 16.2 44 24 44z"/>
                <path fill="#1976D2" d="M43.6 20.5H42V20H24v8h11.3c-1.1 3.2-3.4 5.7-6.6 7.2l6.2 5.2C39.5 37.1 44 31.1 44 24c0-1.3-.1-2.3-.4-3.5z"/>
            </svg>

            Continue with Google

        </button>

    </div>

    <div class="footer">

        Secure authentication powered by Firebase

        <div class="version">

            Zenova Student App • Version 1.0

        </div>

    </div>

</div>

<!--
JavaScript Files

1. firebase.js
   - Initialize Firebase

2. auth.js
   - Google Sign In
   - Check Firestore
   - Redirect

-->
    <script type="module" src="firebase.js"></script>
<script type="module" src="auth.js"></script>

</body>
</html>
