<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Zenova Educations</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>

    body{
      background:#050505;
      color:white;
      font-family:Arial,sans-serif;
    }

    .glass{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
    }

    .input-box{
      width:100%;
      padding:14px;
      border-radius:12px;
      background:#0f0f0f;
      border:1px solid #2a2a2a;
      color:white;
      outline:none;
    }

    .input-box:focus{
      border-color:#facc15;
      box-shadow:0 0 0 3px rgba(250,204,21,0.15);
    }

    .gold{
      color:#facc15;
    }

  </style>

</head>

<body>

<div class="min-h-screen flex items-center justify-center p-6">

  <div class="glass rounded-3xl p-8 w-full max-w-5xl">

    <!-- Header -->
    <div class="flex flex-col lg:flex-row justify-between items-center gap-5 mb-10">

      <div>

        <h1 class="text-4xl font-bold gold">
          ZENOVA EDUCATIONS
        </h1>

        <p class="text-gray-400 mt-2">
          Integrated with Best PU College
        </p>

      </div>

      <button
        id="googleBtn"
        class="bg-yellow-400 hover:bg-yellow-300 text-black px-8 py-3 rounded-xl font-bold"
      >
        Continue with Google
      </button>

    </div>


    <!-- User -->
    <div
      id="userSection"
      class="hidden bg-yellow-400/10 border border-yellow-400/20 rounded-2xl p-5 mb-8"
    >

      <p class="text-lg">
        Logged in as
        <span id="userName" class="gold font-bold"></span>
      </p>

    </div>


    <!-- Application Form -->
    <div
      id="applicationSection"
      class="hidden"
    >

      <h2 class="text-3xl font-bold gold mb-8">
        Scholarship Application Form
      </h2>

      <form id="applicationForm">
<div class="grid md:grid-cols-2 gap-6">

  <!-- Student Name -->
  <div>
    <label class="text-sm text-gray-300">
      Full Name of Student
    </label>

    <input
      type="text"
      id="studentName"
      class="input-box mt-2"
      placeholder="Enter student name"
      required
    >
  </div>


  <!-- DOB -->
  <div>
    <label class="text-sm text-gray-300">
      Date of Birth
    </label>

    <input
      type="date"
      id="dob"
      class="input-box mt-2"
      required
    >
  </div>


  <!-- Gender -->
  <div>

    <label class="text-sm text-gray-300">
      Gender
    </label>

    <select
      id="gender"
      class="input-box mt-2"
      required
    >
      <option value="">
        Select Gender
      </option>

      <option>
        Male
      </option>

      <option>
        Female
      </option>

      <option>
        Other
      </option>

    </select>

  </div>


  <!-- Phone -->
  <div>
    <label class="text-sm text-gray-300">
      Phone Number
    </label>

    <input
      type="tel"
      id="phone"
      class="input-box mt-2"
      placeholder="Enter phone number"
      required
    >
  </div>


  <!-- Father Name -->
  <div>
    <label class="text-sm text-gray-300">
      Father Name
    </label>

    <input
      type="text"
      id="fatherName"
      class="input-box mt-2"
      placeholder="Enter father name"
      required
    >
  </div>


  <!-- Mother Name -->
  <div>
    <label class="text-sm text-gray-300">
      Mother Name
    </label>

    <input
      type="text"
      id="motherName"
      class="input-box mt-2"
      placeholder="Enter mother name"
      required
    >
  </div>


  <!-- Parent Phone -->
  <div>
    <label class="text-sm text-gray-300">
      Parent Phone Number
    </label>

    <input
      type="tel"
      id="parentPhone"
      class="input-box mt-2"
      placeholder="Enter parent phone"
      required
    >
  </div>


  <!-- SSLC -->
  <div>
    <label class="text-sm text-gray-300">
      SSLC Percentage
    </label>

    <input
      type="number"
      id="sslcPercentage"
      class="input-box mt-2"
      placeholder="Enter percentage"
      required
    >
  </div>


  <!-- Stream -->
  <div>

    <label class="text-sm text-gray-300">
      Stream
    </label>

    <select
      id="stream"
      class="input-box mt-2"
      required
    >
      <option value="">
        Select Stream
      </option>

      <option>
        Science
      </option>

      <option>
        Commerce
      </option>

    </select>

  </div>


  <!-- Course -->
  <div>

    <label class="text-sm text-gray-300">
      Course Interested
    </label>

    <select
      id="course"
      class="input-box mt-2"
      required
    >

      <option value="">
        Select Course
      </option>

      <option>
        Boards - PCMB
      </option>

      <option>
        Boards - PCMC
      </option>

      <option>
        Boards + KCET Integrated - PCMB
      </option>

      <option>
        Boards + KCET Integrated - PCMC
      </option>

      <option>
        Boards + KCET + NEET Integrated - PCMB
      </option>

    </select>

  </div>

</div>


<!-- Address -->
<div class="mt-6">

  <label class="text-sm text-gray-300">
    Address
  </label>

  <textarea
    id="address"
    rows="4"
    class="input-box mt-2"
    placeholder="Enter full address"
    required
  ></textarea>

</div>

      

        <div class="mt-10 text-right">

          <button
            type="submit"
            class="bg-yellow-400 hover:bg-yellow-300 text-black px-10 py-4 rounded-xl font-bold text-lg"
          >
            Submit Application
          </button>

        </div>

      </form>

    </div>

  </div>

</div>


<script>

  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyAcqxS2SIpMyaY-jYOz0Y-t67Taa04Fy1o",
    authDomain: "zenova-educations.firebaseapp.com",
    projectId: "zenova-educations",
    storageBucket: "zenova-educations.firebasestorage.app",
    messagingSenderId: "66782392979",
    appId: "1:66782392979:web:2e0c7e70b688401b4f5366",
    measurementId: "G-7JL1SFKDHE"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser = null;


  // GOOGLE LOGIN
  document
  .getElementById('googleBtn')
  .addEventListener('click', async ()=>{

    try{

      const provider =
      new firebase.auth.GoogleAuthProvider();

      await auth.signInWithPopup(provider);

    }
    catch(error){

      console.error(error);
      alert(error.message);

    }

  });



  // AUTH STATE
  auth.onAuthStateChanged(async (user)=>{

    if(user){

      currentUser = user;

      // Show User
      document
      .getElementById('userSection')
      .classList.remove('hidden');

      document
      .getElementById('userName')
      .innerText = user.displayName;

      // Hide Login Button
      document
      .getElementById('googleBtn')
      .style.display = 'none';


      try{

        // Check Existing Application
        const doc = await db
        .collection('applications')
        .doc(user.uid)
        .get();


        // Already Applied
        if(doc.exists){

          window.location.href =
          "dashboard.html";

        }

        // New User
        else{

          document
          .getElementById('applicationSection')
          .classList.remove('hidden');

        }

      }
      catch(error){

        console.error(error);

        // SHOW FORM ANYWAY
        document
        .getElementById('applicationSection')
        .classList.remove('hidden');

      }

    }

  });



  // FORM SUBMIT
  document
  .getElementById('applicationForm')
  .addEventListener('submit', async (e)=>{

    e.preventDefault();

    try{

      await db
      .collection('applications')
      .doc(currentUser.uid)
      .set({

        uid: currentUser.uid,

        email: currentUser.email,

        studentName:
        document.getElementById('studentName').value,

        phone:
        document.getElementById('phone').value,

        parentPhone:
        document.getElementById('parentPhone').value,

        sslcPercentage:
        document.getElementById('sslcPercentage').value,

        stream:
        document.getElementById('stream').value,

        course:
        document.getElementById('course').value,

        status: "Waiting for Approval",

        scholarshipAmount: 0,

        finalFees: 0,

        remarks: "",

        paymentStatus: "Pending",

        createdAt: new Date()

      });


      alert("Application Submitted Successfully");

      window.location.href =
      "dashboard.html";

    }
    catch(error){

      console.error(error);

      alert(error.message);

    }

  });

</script>

</body>
</html>
