<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Zenova Admin Panel</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>

    body{
      background:#050505;
      color:white;
      font-family:Arial,sans-serif;
    }

    .glass{
      background:rgba(255,255,255,0.03);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(12px);
    }

    .gold{
      color:#facc15;
    }

    .input-box{
      width:100%;
      padding:12px;
      border-radius:10px;
      background:#0f0f0f;
      border:1px solid #2a2a2a;
      color:white;
      outline:none;
    }

  </style>

</head>

<body>

<div class="min-h-screen p-6 lg:p-10">

  <!-- Header -->
  <div class="flex flex-col lg:flex-row justify-between items-center gap-5 mb-10">

    <div>

      <h1 class="text-4xl font-bold gold">
        ZENOVA ADMIN PANEL
      </h1>

      <p class="text-gray-400 mt-2">
        Admission & Scholarship Management
      </p>

    </div>

    <button
      id="logoutBtn"
      class="bg-red-500 hover:bg-red-600 px-6 py-3 rounded-xl font-bold"
    >
      Logout
    </button>

  </div>


  <!-- Applications -->
  <div id="applicationsContainer" class="space-y-6"></div>

</div>



<script>

  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyAcqxS2SIpMyaY-jYOz0Y-t67Taa04Fy1o",
    authDomain: "zenova-educations.firebaseapp.com",
    projectId: "zenova-educations",
    storageBucket: "zenova-educations.firebasestorage.app",
    messagingSenderId: "66782392979",
    appId: "1:66782392979:web:2e0c7e70b688401b4f5366",
    measurementId: "G-7JL1SFKDHE"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);

  const auth = firebase.auth();
  const db = firebase.firestore();


  // ADMIN EMAIL
  const adminEmail = "zenovaeducations@gmail.com";


  // Check Login
  auth.onAuthStateChanged(async (user)=>{

    if(!user){

      const provider =
      new firebase.auth.GoogleAuthProvider();

      await auth.signInWithPopup(provider);

      return;

    }

    // Check Admin
    if(user.email !== adminEmail){

      alert("Access Denied");

      await auth.signOut();

      window.location.href = "index.html";

      return;

    }

    loadApplications();

  });



  // Load Applications
  async function loadApplications(){

    const container =
    document.getElementById('applicationsContainer');

    container.innerHTML = "";

    const snapshot =
    await db.collection('applications').get();


    snapshot.forEach((doc)=>{

      const data = doc.data();

      container.innerHTML += `

      <div class="glass rounded-3xl p-8">

        <div class="grid lg:grid-cols-2 gap-8">

          <!-- Left -->
          <div>

            <h2 class="text-3xl font-bold gold mb-6">
              ${data.studentName}
            </h2>

            <div class="space-y-3 text-lg">

              <p>
                <span class="text-gray-400">Email:</span>
                ${data.email}
              </p>

              <p>
                <span class="text-gray-400">Phone:</span>
                ${data.phone}
              </p>

              <p>
                <span class="text-gray-400">Parent Phone:</span>
                ${data.parentPhone}
              </p>

              <p>
                <span class="text-gray-400">SSLC %:</span>
                ${data.sslcPercentage}
              </p>

              <p>
                <span class="text-gray-400">Course:</span>
                ${data.course}
              </p>

            </div>

          </div>


          <!-- Right -->
          <div class="space-y-5">

            <!-- Status -->
            <div>

              <label class="text-gray-400">
                Application Status
              </label>

              <select
                id="status-${doc.id}"
                class="input-box mt-2"
              >
                <option ${
                  data.status === "Waiting for Approval"
                  ? "selected" : ""
                }>
                  Waiting for Approval
                </option>

                <option ${
                  data.status === "Approved"
                  ? "selected" : ""
                }>
                  Approved
                </option>

                <option ${
                  data.status === "Rejected"
                  ? "selected" : ""
                }>
                  Rejected
                </option>

              </select>

            </div>


            <!-- Scholarship -->
            <div>

              <label class="text-gray-400">
                Scholarship Amount
              </label>

              <input
                type="number"
                id="scholarship-${doc.id}"
                value="${data.scholarshipAmount}"
                class="input-box mt-2"
              >

            </div>


            <!-- Final Fees -->
            <div>

              <label class="text-gray-400">
                Final Fees
              </label>

              <input
                type="number"
                id="fees-${doc.id}"
                value="${data.finalFees}"
                class="input-box mt-2"
              >

            </div>


            <!-- Payment -->
            <div>

              <label class="text-gray-400">
                Payment Status
              </label>

              <select
                id="payment-${doc.id}"
                class="input-box mt-2"
              >

                <option ${
                  data.paymentStatus === "Pending"
                  ? "selected" : ""
                }>
                  Pending
                </option>

                <option ${
                  data.paymentStatus === "Partially Paid"
                  ? "selected" : ""
                }>
                  Partially Paid
                </option>

                <option ${
                  data.paymentStatus === "Completed"
                  ? "selected" : ""
                }>
                  Completed
                </option>

              </select>

            </div>


            <!-- Remarks -->
            <div>

              <label class="text-gray-400">
                Remarks
              </label>

              <textarea
                id="remarks-${doc.id}"
                class="input-box mt-2"
                rows="3"
              >${data.remarks}</textarea>

            </div>


            <!-- Save -->
            <button
              onclick="saveApplication('${doc.id}')"
              class="bg-yellow-400 hover:bg-yellow-300 text-black px-8 py-3 rounded-xl font-bold w-full"
            >
              Save Changes
            </button>

          </div>

        </div>

      </div>

      `;

    });

  }



  // Save Application
  async function saveApplication(id){

    try{

      await db.collection('applications')
      .doc(id)
      .update({

        status:
        document.getElementById(`status-${id}`).value,

        scholarshipAmount:
        Number(document.getElementById(`scholarship-${id}`).value),

        finalFees:
        Number(document.getElementById(`fees-${id}`).value),

        paymentStatus:
        document.getElementById(`payment-${id}`).value,

        remarks:
        document.getElementById(`remarks-${id}`).value

      });

      alert("Updated Successfully");

    }
    catch(error){

      console.error(error);

      alert("Update Failed");

    }

  }



  // Logout
  document.getElementById('logoutBtn')
  .addEventListener('click', async ()=>{

    await auth.signOut();

    window.location.href = "index.html";

  });

</script>

</body>
</html>
