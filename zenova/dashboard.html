<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenova Student Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#081c5c,#142f8f,#1f3eb3);
min-height:100vh;
color:white;
padding-bottom:100px;
}

/* Top Bar */

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
}

.menu,.bell{
font-size:26px;
cursor:pointer;
}

.logo{
font-size:18px;
font-weight:700;
}

/* Welcome */

.welcome{
width:92%;
margin:auto;
margin-bottom:15px;
}

.welcome h1{
font-size:24px;
}

.welcome p{
opacity:.8;
font-size:14px;
}

/* Student Card */

.student-card{
width:92%;
margin:auto;
padding:25px;
border-radius:30px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,.25);
position:relative;
overflow:hidden;
}

.student-card::before{
content:"ZENOVA";
position:absolute;
right:-10px;
bottom:-10px;
font-size:60px;
font-weight:700;
opacity:.05;
}

.profile-row{
display:flex;
justify-content:space-between;
align-items:center;
}

.photo{
width:90px;
height:90px;
border-radius:20px;
object-fit:cover;
background:white;
}

.qr{
width:70px;
height:70px;
background:white;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
color:#081c5c;
font-weight:700;
}

.student-name{
font-size:24px;
font-weight:700;
margin-top:15px;
}

.student-id{
opacity:.8;
margin-top:5px;
}

.info{
margin-top:12px;
font-size:14px;
}

.badge{
display:inline-block;
margin-top:15px;
padding:10px 18px;
border-radius:50px;
background:linear-gradient(135deg,#FFD700,#fff2a8);
color:black;
font-weight:700;
}

/* Stats */

.stats{
width:92%;
margin:20px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.stat-card{
background:white;
color:#111;
padding:15px;
border-radius:20px;
text-align:center;
}

.stat-card h2{
font-size:20px;
margin-bottom:5px;
}

/* Section */

.section{
width:92%;
margin:20px auto;
}

.section-title{
font-size:18px;
font-weight:600;
margin-bottom:12px;
}

.card{
background:white;
color:#111;
border-radius:25px;
padding:20px;
box-shadow:0 8px 25px rgba(0,0,0,.18);
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
}

.row:last-child{
border-bottom:none;
}

.green{
color:#00a86b;
font-weight:700;
}

.red{
color:#d62828;
font-weight:700;
}

.btn{
width:100%;
padding:14px;
border:none;
border-radius:15px;
margin-top:15px;
background:#081c5c;
color:white;
font-weight:600;
cursor:pointer;
}

/* Academics */

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.grid-item{
background:white;
color:#111;
padding:20px;
border-radius:20px;
text-align:center;
font-weight:600;
}

/* Notifications */

.notification{
background:white;
color:#111;
padding:15px;
border-radius:18px;
margin-bottom:10px;
}

/* Bottom Nav */

.bottom-nav{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
width:92%;
height:70px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(20px);
border-radius:25px;
display:flex;
justify-content:space-around;
align-items:center;
}

.nav-item{
text-align:center;
font-size:12px;
color:white;
text-decoration:none;
}

.nav-icon{
font-size:22px;
margin-bottom:3px;
}

</style>
</head>

<body>

<div class="topbar">
<div class="menu">☰</div>
<div class="logo">ZENOVA EDUCATIONS</div>
<div class="bell">🔔</div>
</div>

<div class="welcome">
<h1 id="welcomeName">Welcome 👋</h1>
<p id="courseName">Integrated Program Student</p>
</div>

<div class="student-card">

<div class="profile-row">

<img id="studentPhoto"
class="photo"
src="https://via.placeholder.com/100">

<div class="qr">
QR
</div>

</div>

<div class="student-name"
id="studentName">
Loading...
</div>

<div class="student-id"
id="studentId">
Loading...
</div>

<div class="info"
id="studentDob">
DOB
</div>

<div class="info"
id="studentStream">
Stream
</div>

<div class="info">
📍 Zenova Integrated Program
</div>

<div class="badge"
id="scholarshipStatus">
SCHOLARSHIP APPROVED
</div>

</div>

<div class="stats">

<div class="stat-card">
<h2 id="attendance">0%</h2>
<p>Attendance</p>
</div>

<div class="stat-card">
<h2 id="rank">0</h2>
<p>KCET Rank</p>
</div>

<div class="stat-card">
<h2 id="pendingFee">₹0</h2>
<p>Balance</p>
</div>

</div>

<div class="section">

<div class="section-title">
💰 Fees Overview
</div>

<div class="card">

<div class="row">
<span>Actual Fee</span>
<span id="actualFee">₹0</span>
</div>

<div class="row">
<span>Zenova Scholarship</span>
<span class="green"
id="zenovaScholarship">₹0</span>
</div>

<div class="row">
<span>Trust Scholarship</span>
<span class="green"
id="trustScholarship">₹0</span>
</div>

<div class="row">
<span>Paid Amount</span>
<span id="paidFee">₹0</span>
</div>

<div class="row">
<span>Balance Fee</span>
<span class="red"
id="balanceFee">₹0</span>
</div>

<button class="btn">
View Full Fee Details
</button>

</div>

</div>
